# Plugin identity/version -- kept in sync with plugin.xml's <id>/<idea-version>.
pluginGroup = com.opalclient.scripting
pluginName = Opal Scripting Support
pluginVersion = 0.1.0
pluginSinceBuild = 241
pluginUntilBuild = 252.*

# IntelliJ Platform to compile/run against. IC = IntelliJ IDEA Community, the
# smallest target that still exercises every extension point this plugin
# uses (file templates, live templates, actions). None of our compiled code
# references JS-plugin classes, so IC is sufficient to build against even
# though the ambient-types feature is only useful at runtime in an IDE that
# ships the bundled JavaScript/TypeScript plugin (WebStorm, or IntelliJ IDEA
# Ultimate with it enabled).
platformType = IC
platformVersion = 2024.1

org.gradle.caching = true
org.gradle.parallel = true
kotlin.stdlib.default.dependency = false
